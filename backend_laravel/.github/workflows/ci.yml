name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend_laravel
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: mindra_test
        ports: ['3306:3306']
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_mysql, openssl, mbstring
          coverage: none
      - name: Install dependencies
        run: composer install --no-interaction --no-scripts --prefer-dist
      - name: Copy .env
        run: |
          cp .env.example .env.testing 2>/dev/null || true
          cat > .env.testing << 'EOF'
          APP_NAME=Mindra
          APP_ENV=testing
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_DEBUG=true
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=mindra_test
          DB_USERNAME=root
          DB_PASSWORD=secret
          SESSION_DRIVER=array
          CACHE_STORE=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          FCM_PROJECT_ID=
          EOF
      - name: Generate key
        run: php artisan key:generate --env=testing
      - name: Run migrations
        run: php artisan migrate --env=testing --force
      - name: Run tests
        run: php artisan test --env=testing
